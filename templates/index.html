<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Request Board</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>🗡️ Guild Request Board 🗡️</h1>
            <p>Anime Guild &amp; Assassin Request System</p>
            <div id="user-bar" class="user-bar"></div>
        </header>

        <main>
            <section class="board-section">
                <h2>Available Requests</h2>
                <div id="requests-list" class="requests-container"></div>
            </section>

            <section id="my-requests-section" class="board-section" style="display:none;">
                <h2>My Requests</h2>

                <div class="my-requests-grid">
                    <div class="my-requests-column">
                        <h3 class="my-requests-heading accepted-heading">In Progress</h3>
                        <div id="my-active-list"></div>
                    </div>
                    <div class="my-requests-column">
                        <h3 class="my-requests-heading completed-heading">Completed</h3>
                        <div id="my-completed-list"></div>
                    </div>
                    <div class="my-requests-column">
                        <h3 class="my-requests-heading declined-heading">Declined</h3>
                        <div id="my-declined-list"></div>
                    </div>
                </div>
            </section>

            <section class="form-section">
                <h2>Quick Actions</h2>
                <div class="action-buttons">
                    <button onclick="showRegisterForm()" class="btn btn-primary">Register User</button>
                    <button onclick="showSetUserForm()" class="btn btn-primary">Set User</button>
                    <button onclick="showCreateGuildForm()" class="btn btn-primary">Create Guild</button>
                    <button onclick="saveBoard()" class="btn btn-secondary">Save Board</button>
                    <button onclick="loadBoard()" class="btn btn-secondary">Load Board</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 Guild Request Board System</p>
        </footer>
    </div>

    <audio id="bg-music" loop>
        <source src="{{ url_for('static', filename='medieval_inn_music.mp3') }}" type="audio/mpeg">
    </audio>

    <div id="music-banner" class="music-banner" style="display:none;">
        🎵 Click anywhere to start the music
    </div>

    <button id="music-toggle" class="music-toggle" title="Toggle music">🎵</button>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
